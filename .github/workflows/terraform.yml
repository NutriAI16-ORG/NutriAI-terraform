name: "Terraform — NutriAI Infrastructure"

# ============================================================
# Triggers
# ============================================================
on:
  push:
    branches:
      - main   # → prod environment
      - dev    # → dev environment
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

# ============================================================
# Permissions
# The self-hosted runner authenticates via its System-Assigned
# Managed Identity — no OIDC token or stored credentials needed.
# ============================================================
permissions:
  contents: read
  pull-requests: write   # Allows posting plan output as PR comment

# ============================================================
# Environment resolution:
#   main branch  → prod
#   dev  branch  → dev
# ============================================================
env:
  TF_VERSION: "1.15.6"
  TF_WORKING_DIR: "."
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  terraform:
    name: "Terraform (${{ github.ref_name }})"
    runs-on: self-hosted

    # GitHub Environments gate: require manual approval for prod apply
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    env:
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_vm_admin_password: ${{ secrets.VM_ADMIN_PASSWORD }}
      TF_VAR_smtp_username: ${{ secrets.SMTP_USERNAME }}
      TF_VAR_smtp_password: ${{ secrets.SMTP_PASSWORD }}
      TF_VAR_entra_tenant_id: ${{ secrets.ENTRA_TENANT_ID }}
      TF_VAR_entra_client_id: ${{ secrets.ENTRA_CLIENT_ID }}
      TF_VAR_entra_client_secret: ${{ secrets.ENTRA_CLIENT_SECRET }}
      TF_VAR_entra_redirect_uri: ${{ secrets.ENTRA_REDIRECT_URI }}
      TF_VAR_redis_password: ${{ secrets.REDIS_PASSWORD }}


    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      # Step 1: Checkout the git repository
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # Scan Terraform configuration files for security vulnerabilities using tfsec
      - name: "Run tfsec security scan"
        run: |
          if ! command -v tfsec &> /dev/null; then
            echo "Installing tfsec..."
            curl -sLo tfsec https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64
            chmod +x tfsec
            ./tfsec --soft-fail .
          else
            tfsec --soft-fail .
          fi


      # Step 2: Set environment variables based on the active branch
      - name: "Set environment variables"
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV_NAME=prod"                                       >> $GITHUB_ENV
            echo "TFVARS_FILE=environments/prod/terraform.tfvars"     >> $GITHUB_ENV
            echo "TF_BACKEND_KEY=nutriai-prod.tfstate"                >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev"                                        >> $GITHUB_ENV
            echo "TFVARS_FILE=environments/dev/terraform.tfvars"      >> $GITHUB_ENV
            echo "TF_BACKEND_KEY=nutriai-dev.tfstate"                 >> $GITHUB_ENV
          fi

      # Step 3: Install necessary system dependencies (unzip, azure-cli, nodejs)
      - name: "Install dependencies"
        run: |
          if ! command -v unzip &> /dev/null; then
            echo "unzip not found, installing..."
            sudo apt-get update && sudo apt-get install -y unzip
          else
            echo "unzip is already installed."
          fi
          if ! command -v az &> /dev/null; then
            echo "azure-cli not found, installing..."
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          fi
          if ! command -v node &> /dev/null; then
            echo "node not found, installing..."
            sudo apt-get install -y nodejs
          fi

      # Step 4: Install the specified version of Terraform
      - name: "Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # Step 5: Authenticate with Azure using the self-hosted runner's Managed Identity
      - name: "Azure Login (Managed Identity)"
        run: |
          az login --identity --output none
          echo "ARM_SUBSCRIPTION_ID=$(az account show --query id --output tsv)" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=$(az account show --query tenantId --output tsv)" >> $GITHUB_ENV


      # Step 6: Validate Terraform code formatting compliance
      - name: "Terraform Format Check"
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: "Post fmt result to PR"
        if: github.event_name == 'pull_request' && steps.fmt.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Terraform fmt check failed.** Run `terraform fmt -recursive` locally and commit the changes.'
            })

      # Step 7: Initialize the Terraform configuration with the environment-specific backend key
      - name: "Terraform Init"
        id: init
        run: |
          terraform init \
            -backend-config="key=${{ env.TF_BACKEND_KEY }}" \
            -input=false

      # Step 8: Perform a validation check of the HCL code structure
      - name: "Terraform Validate"
        id: validate
        run: terraform validate -no-color

      # Step 9: Generate a speculative execution plan for the environment changes
      - name: "Terraform Plan"
        id: plan
        run: |
          terraform plan \
            -var-file="${{ env.TFVARS_FILE }}" \
            -out=tfplan \
            -input=false \
            -no-color 2>&1 | tee plan_output.txt

      # Step 10: If running on a PR, post the plan output as a comment
      - name: "Post Plan to PR"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = plan.length > maxLen ? plan.substring(0, maxLen) + '\n\n... [truncated]' : plan;
            const body = `## Terraform Plan — \`${{ env.ENV_NAME }}\`
            \`\`\`hcl
            ${truncated}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # Step 11: Apply the changes if pushed to main/dev or triggered manually
      - name: "Terraform Apply"
        if: >
          (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'dev')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            tfplan
